<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f0e8;
            --surface: #fdfaf4;
            --navy: #1a2744;
            --navy-light: #2d3f6b;
            --accent: #c8a96e;
            --text: #2c2c2c;
            --muted: #8a8a8a;
            --border: #e0d8c8;
            --shadow: 0 4px 24px rgba(26, 39, 68, 0.08);
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(200, 169, 110, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(26, 39, 68, 0.05) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--navy);
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 0.3rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .error {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-size: 0.85rem;
            color: #cc3333;
            margin-bottom: 1.2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--navy);
            margin-bottom: 0.4rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--navy);
            box-shadow: 0 0 0 3px rgba(26, 39, 68, 0.08);
        }

        .btn {
            width: 100%;
            background: var(--navy);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.8rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .btn:hover { background: var(--navy-light); }
        .btn:active { transform: scale(0.99); }

        .link {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .link a {
            color: var(--navy);
            text-decoration: none;
            font-weight: 500;
        }

        .link a:hover { color: var(--accent); }

        .divider {
            width: 40px;
            height: 2px;
            background: var(--accent);
            margin: 0 auto 1.5rem;
            border-radius: 2px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1>Planify</h1>
        <div class="divider"></div>
        <p>일정 관리 서비스</p>
    </div>

    <div class="card">
        <p class="error" th:if="${param.error}">이메일 또는 비밀번호가 올바르지 않습니다.</p>
        <form action="/login" method="post">
            <div class="form-group">
                <label>이메일</label>
                <input type="email" name="username" placeholder="이메일 입력">
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호 입력">
            </div>
            <button type="submit" class="btn">로그인</button>
        </form>
        <div class="link">
            계정이 없으신가요? <a href="/register">회원가입</a>
        </div>
    </div>
</div>
</body>
</html>
