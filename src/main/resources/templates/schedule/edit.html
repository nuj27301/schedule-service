<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>일정 수정</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f0e8;
            --surface: #fdfaf4;
            --navy: #1a2744;
            --navy-light: #2d3f6b;
            --accent: #c8a96e;
            --text: #2c2c2c;
            --muted: #8a8a8a;
            --border: #e0d8c8;
            --shadow: 0 4px 24px rgba(26, 39, 68, 0.08);
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
        }

        .header {
            background: var(--navy);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            color: white;
            font-size: 1.5rem;
        }

        .back-btn {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            padding: 0.3rem 0.8rem;
            transition: all 0.2s;
        }

        .back-btn:hover { color: white; border-color: rgba(255,255,255,0.5); }

        .container {
            max-width: 560px;
            margin: 0 auto;
            padding: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow);
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--navy);
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--navy);
            margin-bottom: 0.4rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input[type="text"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--navy);
            box-shadow: 0 0 0 3px rgba(26, 39, 68, 0.08);
        }

        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn {
            width: 100%;
            background: var(--navy);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.8rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn:hover { background: var(--navy-light); }
    </style>
</head>
<body>

<div class="header">
    <a href="/schedule" class="back-btn">← 목록</a>
    <h1>Planify</h1>
</div>

<div class="container">
    <div class="card">
        <div class="card-title">일정 수정</div>
        <form th:action="@{/schedule/{id}/edit(id=${schedule.id})}" method="post">
            <div class="form-group">
                <label>제목</label>
                <input type="text" name="title" th:value="${schedule.title}">
            </div>
            <div class="form-group">
                <label>내용</label>
                <textarea name="description" th:text="${schedule.description}"></textarea>
            </div>
            <div class="date-row">
                <div class="form-group">
                    <label>시작일</label>
                    <input type="date" name="startDate" th:value="${schedule.startDate}">
                </div>
                <div class="form-group">
                    <label>종료일</label>
                    <input type="date" name="endDate" th:value="${schedule.endDate}">
                </div>
            </div>
            <div class="form-group">
                <label>상태</label>
                <select name="status">
                    <option value="TODO" th:selected="${schedule.status.name() == 'TODO'}">할 일</option>
                    <option value="IN_PROGRESS" th:selected="${schedule.status.name() == 'IN_PROGRESS'}">진행 중</option>
                    <option value="DONE" th:selected="${schedule.status.name() == 'DONE'}">완료</option>
                </select>
            </div>
            <button type="submit" class="btn">저장하기</button>
        </form>
    </div>
</div>
</body>
</html>
